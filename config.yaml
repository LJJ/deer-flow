config_version: 4
log_level: info

token_usage:
  enabled: false

models:
  - name: gpt-5.4
    display_name: GPT 5.4 (Azure)
    use: langchain_openai:ChatOpenAI
    model: gpt-5.4
    api_key: $OPENAI_API_KEY
    base_url: https://zaoci-02-gpt-east-us2.openai.azure.com/openai/v1
    request_timeout: 600.0
    max_retries: 2
    max_completion_tokens: 8192
    temperature: 0.7

tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash

tools:
  - name: web_search
    group: web
    use: deerflow.community.ddg_search.tools:web_search_tool
    max_results: 5

  - name: ls
    group: file:read
    use: deerflow.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: deerflow.sandbox.tools:read_file_tool

tool_search:
  enabled: false

sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider
  allow_host_bash: true

subagents:
  timeout_seconds: 1800

skills:
  container_path: /mnt/skills

title:
  enabled: false

summarization:
  enabled: false

memory:
  enabled: false

checkpointer:
  type: memory
